name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      KUBECONFIG: /tmp/carbide-e2e-kubeconfig
      NVIDIA_CARBIDE_API_ENDPOINT: http://localhost:8388
      NVIDIA_CARBIDE_KEYCLOAK_URL: http://localhost:8082
      NVIDIA_CARBIDE_API_ENDPOINT_INTERNAL: http://carbide-rest-api.carbide-rest.svc:8388
      IMG: localhost/machine-api-provider-nvidia-carbide:e2e
    steps:
      - name: Checkout provider
        uses: actions/checkout@v4

      - name: Checkout NVIDIA bare-metal-manager-rest
        uses: actions/checkout@v4
        with:
          repository: NVIDIA/bare-metal-manager-rest
          path: bare-metal-manager-rest

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Increase inotify limits
        run: sudo sysctl -w fs.inotify.max_user_instances=512

      - name: Deploy Carbide REST stack
        run: make kind-reset
        working-directory: bare-metal-manager-rest
        timeout-minutes: 20
        env:
          KUBECONFIG: ""

      - name: Verify Carbide API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8388/healthz; then
              echo "API is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "API health check failed"
          exit 1

      - name: Export kubeconfig
        run: kind get kubeconfig --name carbide-rest-local > $KUBECONFIG

      - name: Install Machine API CRDs
        run: kubectl apply -f config/crd/external/

      - name: Build and load provider image
        run: |
          make docker-build IMG=$IMG
          kind load docker-image $IMG --name carbide-rest-local

      - name: Deploy provider controller
        run: |
          kubectl apply -f config/manager/namespace.yaml
          kubectl apply -f config/rbac/
          sed -i "s|ghcr.io/fabiendupont/machine-api-provider-nvidia-carbide:latest|$IMG|" \
            config/manager/deployment.yaml
          kubectl apply -f config/manager/
          kubectl wait --for=condition=Available deployment/controller-manager \
            -n machine-api-provider-nvidia-carbide-system --timeout=5m

      - name: Run e2e tests
        run: |
          make test-e2e-live || true
          echo "=== Controller logs ==="
          kubectl logs -l control-plane=controller-manager \
            -n machine-api-provider-nvidia-carbide-system --tail=100
          echo "=== Machine objects ==="
          kubectl get machines.machine.openshift.io -A -o yaml || true
          # Fail if tests failed
          make test-e2e-live

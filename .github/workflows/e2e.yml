name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout provider
        uses: actions/checkout@v4

      - name: Checkout NVIDIA bare-metal-manager-rest
        uses: actions/checkout@v4
        with:
          repository: NVIDIA/bare-metal-manager-rest
          path: bare-metal-manager-rest

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Deploy Carbide REST stack
        run: make kind-reset
        working-directory: bare-metal-manager-rest
        timeout-minutes: 20

      - name: Verify Carbide API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8388/healthz; then
              echo "API is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "API health check failed"
          exit 1

      - name: Install Machine API CRDs
        run: |
          kind get kubeconfig --name carbide-rest-local > /tmp/carbide-e2e-kubeconfig
          KUBECONFIG=/tmp/carbide-e2e-kubeconfig kubectl apply -f config/crd/external/

      - name: Build and load provider image
        run: |
          make docker-build IMG=localhost/machine-api-provider-nvidia-carbide:e2e
          kind load docker-image localhost/machine-api-provider-nvidia-carbide:e2e \
            --name carbide-rest-local

      - name: Deploy provider controller
        run: |
          KUBECONFIG=/tmp/carbide-e2e-kubeconfig kubectl apply -f config/rbac/ || true
          KUBECONFIG=/tmp/carbide-e2e-kubeconfig kubectl apply -f config/manager/ || true

      - name: Run e2e tests
        run: make test-e2e-live
        env:
          NVIDIA_CARBIDE_API_ENDPOINT: http://localhost:8388
          NVIDIA_CARBIDE_KEYCLOAK_URL: http://localhost:8082
          IMG: localhost/machine-api-provider-nvidia-carbide:e2e

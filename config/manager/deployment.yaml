apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: machine-api-provider-nico-system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: machine-api-provider-nico
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: machine-api-provider-nico
  replicas: 1
  template:
    metadata:
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: machine-api-provider-nico
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - command:
            - /manager
          image: ghcr.io/fabiendupont/machine-api-provider-nico:latest
          name: manager
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
      serviceAccountName: machine-api-provider-nico-controller-manager
      terminationGracePeriodSeconds: 10
